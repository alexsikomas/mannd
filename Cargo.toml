[package]
name = "networkd-wg-manager"
version = "0.1.0"
authors = ["Alexander Sikomas"]
edition = "2021"

[dependencies]
dioxus = { version = "0.6.0", features = [] }
dioxus-free-icons = { version = "0.9", features = ["font-awesome-solid"] }

[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]

[profile]

[profile.wasm-dev]
inherits = "dev"
opt-level = 1

[profile.server-dev]
inherits = "dev"

[profile.android-dev]
inherits = "dev"
