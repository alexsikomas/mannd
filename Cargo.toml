[workspace]
resolver = "3"
members = ["com", "tui"]

[workspace.dependencies]
serde = "1.0.228"
thiserror = "2.0.17"
tokio = { version = "1.47.1", features = [
    "macros",
    "net",
    "rt",
    "rt-multi-thread",
    "sync",
    "signal",
] }
futures = "0.3.31"
futures-timer = "3.0.3"
toml = "0.9.7"
tracing = "0.1.41"
derive_builder = "0.20.2"
tracing-error = "0.2.1"
postcard = { version = "1.1.3", default-features = false, features = [
    "use-std",
] }
tracing-subscriber = { version = "0.3.20", features = ["fmt"] }
bitflags = { version = "2.10.0", features = ["serde"] }

[profile.dev]
opt-level = 0

[profile.release]
codegen-units = 1
opt-level = "z"
strip = true
lto = true
panic = "abort"
debug = false
incremental = false
